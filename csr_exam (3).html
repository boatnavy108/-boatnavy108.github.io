<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CSR EXAM</title>
<style>
  :root{
    --bg:#0a0f1c;
    --bg2:#0c1322;
    --panel:#111a2c;
    --panel2:#0f1728;
    --line:#1e293f;
    --line-soft:#1a2336;
    --txt:#e7ecf6;
    --muted:#8b97b0;
    --muted2:#5f6b85;
    --accent:#f6a623;
    --accent2:#fbbf24;
    --accent-glow:rgba(246,166,35,.18);
    --green:#34d399;
    --green-bg:rgba(52,211,153,.12);
    --red:#f87171;
    --red-bg:rgba(248,113,113,.12);
    --purple:#a78bfa;
    --purple-bg:rgba(167,139,250,.16);
    --radius:16px;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{background:var(--bg);color:var(--txt);
    font-family:"Inter","Segoe UI",system-ui,-apple-system,"Helvetica Neue","Sarabun",sans-serif;
    -webkit-font-smoothing:antialiased;}
  body{min-height:100vh;background:
    radial-gradient(1200px 600px at 80% -10%, rgba(246,166,35,.05), transparent 60%),
    radial-gradient(900px 500px at -10% 10%, rgba(99,102,241,.05), transparent 55%),
    var(--bg);}
  .wrap{max-width:760px;margin:0 auto;padding:0 18px 80px;}
  button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit}

  /* ---------- top bar ---------- */
  .topbar{display:flex;align-items:center;justify-content:space-between;
    padding:22px 4px 14px;border-bottom:1px solid var(--line-soft);margin-bottom:26px;}
  .brand{display:flex;align-items:center;gap:10px}
  .brand .logo{font-size:22px}
  .brand h1{font-size:21px;font-weight:800;letter-spacing:.5px;color:var(--accent)}
  .brand small{display:block;font-size:11px;color:var(--muted2);font-weight:500;letter-spacing:.3px;margin-top:1px}
  .hist-btn{display:flex;align-items:center;gap:7px;border:1px solid var(--line);
    background:var(--panel2);padding:8px 14px;border-radius:11px;font-size:13px;color:var(--muted);font-weight:600;transition:.18s}
  .hist-btn:hover{border-color:var(--accent);color:var(--accent)}

  /* ---------- headings ---------- */
  .page-title{font-size:33px;font-weight:800;letter-spacing:-.5px;line-height:1.1}
  .page-title .hl{color:var(--accent)}
  .page-sub{color:var(--muted);font-size:14px;margin:10px 0 24px}

  /* ---------- hero (A320) ---------- */
  .hero{position:relative;border:1px solid var(--line);border-radius:var(--radius);
    overflow:hidden;margin:4px 0 24px;background:linear-gradient(135deg,#0e1830,#0a1120 60%,#0c1322)}
  .hero img{display:block;width:100%;height:auto}
  .hero-scrim{position:absolute;inset:0;pointer-events:none;
    background:linear-gradient(180deg,rgba(10,15,28,0) 55%,rgba(10,15,28,.55) 100%)}
  .hero-overlay{position:absolute;left:20px;bottom:16px;right:20px}
  .hero-kicker{display:inline-flex;align-items:center;gap:6px;font-size:10.5px;font-weight:800;
    letter-spacing:1.6px;text-transform:uppercase;color:var(--accent);
    background:var(--accent-glow);border:1px solid rgba(246,166,35,.3);
    padding:4px 11px;border-radius:8px}
  @media(max-width:560px){.hero-overlay{left:14px;bottom:12px}.hero-kicker{letter-spacing:1px}}

  /* ---------- quiz timer ---------- */
  .qhead-right{display:flex;align-items:center;gap:11px}
  .timer{display:flex;align-items:center;gap:5px;font-size:14px;font-weight:800;
    background:var(--panel2);border:1px solid var(--line);padding:6px 12px;border-radius:11px;
    color:var(--accent);transition:.18s;font-variant-numeric:tabular-nums}
  .timer .ic{font-size:13px}
  .timer small{font-weight:600;opacity:.75}
  .timer.warn{color:var(--accent2);border-color:rgba(251,191,36,.45);background:rgba(251,191,36,.08)}
  .timer.danger{color:var(--red);border-color:rgba(248,113,113,.5);background:var(--red-bg);
    animation:tpulse .6s ease-in-out infinite}
  @keyframes tpulse{50%{opacity:.5}}

  /* ---------- performance panel ---------- */
  .perf{background:linear-gradient(180deg,var(--panel),var(--panel2));
    border:1px solid var(--line);border-radius:var(--radius);padding:24px;margin-bottom:22px}
  .perf-empty{text-align:center;padding:8px 4px}
  .perf-empty .ico{font-size:30px}
  .perf-empty h3{margin:10px 0 8px;font-size:18px;font-weight:700}
  .perf-empty p{color:var(--muted);font-size:13.5px;line-height:1.6;max-width:440px;margin:0 auto}
  .perf-head{display:flex;align-items:center;gap:9px;font-size:16px;font-weight:700;margin-bottom:18px}
  .perf-grid{display:grid;grid-template-columns:minmax(0,1fr) 220px;gap:26px;align-items:center}
  @media(max-width:560px){.perf-grid{grid-template-columns:1fr;gap:20px}}
  .stat-row{display:flex;gap:10px;margin-bottom:14px}
  .stat-box{flex:1;background:var(--bg2);border:1px solid var(--line-soft);border-radius:12px;padding:12px 14px}
  .stat-box .n{font-size:19px;font-weight:800;color:var(--accent)}
  .stat-box .l{font-size:11px;color:var(--muted);margin-top:2px}
  .sw{display:flex;gap:10px}
  .sw .tag{flex:1;border-radius:11px;padding:11px 13px;font-size:12px}
  .sw .strong{background:var(--green-bg);border:1px solid rgba(52,211,153,.25)}
  .sw .weak{background:var(--red-bg);border:1px solid rgba(248,113,113,.25)}
  .sw .tag .cap{font-size:10.5px;letter-spacing:.6px;text-transform:uppercase;opacity:.8;font-weight:700}
  .sw .strong .cap{color:var(--green)}.sw .weak .cap{color:var(--red)}
  .sw .tag .v{font-size:13.5px;font-weight:700;margin-top:3px}

  /* ---------- cards grid ---------- */
  .grid{display:grid;grid-template-columns:1fr 1fr;gap:16px}
  @media(max-width:560px){.grid{grid-template-columns:1fr}}
  .card{position:relative;background:linear-gradient(180deg,var(--panel),var(--panel2));
    border:1px solid var(--line);border-radius:var(--radius);padding:20px;text-align:left;
    transition:.18s;overflow:hidden}
  .card:hover{transform:translateY(-3px);border-color:#2c3a58}
  .card.featured{border-color:var(--accent);box-shadow:0 0 0 1px var(--accent-glow),0 10px 30px -12px rgba(246,166,35,.3)}
  .card .ico{font-size:26px}
  .card h3{font-size:17px;font-weight:700;margin:14px 0 6px}
  .card p{font-size:12.5px;color:var(--muted);line-height:1.5}
  .badge{position:absolute;top:16px;right:16px;background:var(--accent);color:#1a1205;
    font-size:11px;font-weight:800;padding:4px 9px;border-radius:8px;letter-spacing:.2px}
  .badge.guide{background:var(--accent2)}
  .badge.all{background:var(--purple-bg);color:var(--purple);border:1px solid rgba(167,139,250,.4)}
  .section-label{font-size:12px;letter-spacing:1.2px;text-transform:uppercase;color:var(--muted2);
    font-weight:700;margin:26px 4px 14px}

  /* ---------- quiz ---------- */
  .quiz-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px}
  .back{display:flex;align-items:center;gap:7px;color:var(--muted);font-size:13.5px;font-weight:600}
  .back:hover{color:var(--accent)}
  .qmeta{font-size:13px;color:var(--muted)}
  .qmeta b{color:var(--accent)}
  .progress{height:6px;background:var(--line-soft);border-radius:99px;margin:14px 0 22px;overflow:hidden}
  .progress > i{display:block;height:100%;background:linear-gradient(90deg,var(--accent),var(--accent2));border-radius:99px;transition:width .3s}
  .qcat{display:inline-block;font-size:11px;font-weight:700;letter-spacing:.4px;color:var(--accent);
    background:var(--accent-glow);border:1px solid rgba(246,166,35,.3);padding:4px 11px;border-radius:8px;margin-bottom:14px}
  .qtext{font-size:20px;font-weight:700;line-height:1.45;margin-bottom:22px}
  .opts{display:flex;flex-direction:column;gap:11px}
  .opt{display:flex;align-items:flex-start;gap:13px;text-align:left;width:100%;
    background:var(--panel2);border:1.5px solid var(--line);border-radius:13px;padding:15px 16px;
    font-size:15px;line-height:1.4;transition:.15s}
  .opt:hover:not(:disabled){border-color:#3a4a6e;background:#121b30}
  .opt .key{flex:none;width:26px;height:26px;border-radius:7px;background:var(--line);
    display:grid;place-items:center;font-size:13px;font-weight:700;color:var(--muted)}
  .opt.correct{border-color:var(--green);background:var(--green-bg)}
  .opt.correct .key{background:var(--green);color:#062b1d}
  .opt.wrong{border-color:var(--red);background:var(--red-bg)}
  .opt.wrong .key{background:var(--red);color:#2b0606}
  .opt.dim{opacity:.5}
  .opt:disabled{cursor:default}
  .explain{margin-top:18px;background:var(--bg2);border:1px solid var(--line);border-left:3px solid var(--accent);
    border-radius:12px;padding:15px 17px;font-size:14px;line-height:1.6;display:none}
  .explain.show{display:block;animation:fade .25s ease}
  .explain .lbl{font-size:11px;font-weight:800;letter-spacing:.8px;text-transform:uppercase;color:var(--accent);margin-bottom:6px;display:flex;gap:6px;align-items:center}
  .explain.ok{border-left-color:var(--green)}.explain.ok .lbl{color:var(--green)}
  .explain.no{border-left-color:var(--red)}.explain.no .lbl{color:var(--red)}
  @keyframes fade{from{opacity:0;transform:translateY(6px)}to{opacity:1}}
  .next-bar{display:flex;justify-content:flex-end;margin-top:22px}
  .btn-primary{background:var(--accent);color:#1a1205;font-weight:800;font-size:15px;
    padding:13px 26px;border-radius:12px;transition:.15s}
  .btn-primary:hover{background:var(--accent2);transform:translateY(-1px)}
  .btn-ghost{border:1px solid var(--line);color:var(--muted);font-weight:600;font-size:14px;padding:13px 22px;border-radius:12px}
  .btn-ghost:hover{border-color:var(--accent);color:var(--accent)}

  /* ---------- results ---------- */
  .result-hero{text-align:center;padding:30px 10px 10px}
  .ring{margin:0 auto 18px}
  .result-hero h2{font-size:24px;font-weight:800}
  .result-hero .pct{font-size:14px;color:var(--muted);margin-top:6px}
  .res-cats{margin-top:22px}
  .res-cat{display:flex;align-items:center;gap:12px;padding:12px 0;border-bottom:1px solid var(--line-soft)}
  .res-cat:last-child{border-bottom:none}
  .res-cat .name{flex:1;font-size:14px;font-weight:600}
  .res-cat .bar{flex:none;width:120px;height:7px;background:var(--line-soft);border-radius:99px;overflow:hidden}
  .res-cat .bar > i{display:block;height:100%;border-radius:99px}
  .res-cat .sc{flex:none;width:54px;text-align:right;font-size:13px;font-weight:700;color:var(--muted)}
  .res-actions{display:flex;gap:12px;margin-top:26px}
  .res-actions > *{flex:1;text-align:center}

  /* radar */
  .radar-wrap{display:grid;place-items:center}
  .radar{overflow:visible;width:100%;max-width:300px;height:auto}
  .radar text{fill:var(--muted);font-size:10px;font-weight:600}
  .radar .grid-line{stroke:var(--line);fill:none}
  .radar .axis{stroke:var(--line-soft)}
  .radar .area{fill:rgba(246,166,35,.18);stroke:var(--accent);stroke-width:2;stroke-linejoin:round}
  .radar .dot{fill:var(--accent)}

  /* history modal */
  .modal{position:fixed;inset:0;background:rgba(5,8,15,.7);backdrop-filter:blur(4px);
    display:none;align-items:flex-start;justify-content:center;padding:60px 18px;z-index:50;overflow:auto}
  .modal.show{display:flex}
  .sheet{background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);
    width:100%;max-width:520px;padding:24px}
  .sheet-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:18px}
  .sheet-head h3{font-size:18px;font-weight:700}
  .sheet-head button{font-size:20px;color:var(--muted);width:32px;height:32px;border-radius:8px}
  .sheet-head button:hover{background:var(--line)}
  .hist-item{display:flex;align-items:center;gap:12px;padding:12px;border:1px solid var(--line-soft);border-radius:12px;margin-bottom:10px}
  .hist-item .src{flex:1}
  .hist-item .src .t{font-size:14px;font-weight:600}
  .hist-item .src .d{font-size:11.5px;color:var(--muted2);margin-top:2px}
  .hist-item .score{font-size:16px;font-weight:800;color:var(--accent)}
  .hist-empty{text-align:center;color:var(--muted);font-size:13.5px;padding:24px 0}
  .clearbtn{width:100%;margin-top:8px;border:1px solid var(--line);color:var(--red);font-size:13px;font-weight:600;padding:11px;border-radius:11px}
  .clearbtn:hover{background:var(--red-bg);border-color:var(--red)}
  .count-sub{font-size:13px;color:var(--muted);margin:-6px 0 16px}
  .count-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;margin-bottom:16px}
  .count-opt{border:1px solid var(--line);background:var(--panel2);border-radius:12px;padding:14px;
    font-size:15px;font-weight:700;color:var(--txt);transition:.15s;cursor:pointer;text-align:center}
  .count-opt:hover{border-color:var(--accent);color:var(--accent)}
  .count-opt small{display:block;font-size:11px;font-weight:500;color:var(--muted2);margin-top:3px}
  .count-custom{display:flex;align-items:center;gap:8px;border-top:1px solid var(--line-soft);padding-top:16px}
  .count-custom label{font-size:13px;color:var(--muted);font-weight:600;white-space:nowrap}
  .count-custom input{flex:1;min-width:0;background:var(--panel2);border:1px solid var(--line);
    border-radius:10px;padding:10px 12px;color:var(--txt);font-size:15px;font-weight:600}
  .count-go{background:var(--accent);color:#1a1205;font-weight:800;padding:10px 16px;border-radius:10px;font-size:14px;white-space:nowrap}
  .count-go:hover{background:var(--accent2)}
  .hidden{display:none!important}
</style>
</head>

<script>
/* =================================================================
   ► คลังข้อสอบ — แก้ไขตรงนี้ได้เลย

            answer = ลำดับคำตอบที่ถูก (0=ก,1=ข,2=ค,3=ง),
            explain = คำเฉลย/คำอธิบาย
   * ดึงจากไฟล์ A320/A321 CSR Questions (Thai AirAsia) อัตโนมัติด้วย OCR
     เอา 10 ข้อแรกของแต่ละหัวข้อ (DSC) คำตอบ=ตำแหน่งที่ไฮไลต์เหลืองในต้นฉบับ
   * อาจมี OCR คลาดเคลื่อนเล็กน้อย แนะนำตรวจทานก่อนใช้สอบจริง
   ================================================================= */
const EXAM = [
  {
    id:"dsc21", name:"ระบบปรับอากาศ/ความดัน (DSC 21)", icon:"❄️",
    desc:"Air Cond / Press / Vent",
    questions:[
      {q:"When does the outflow valve fully open to ensure no residual cabin pressure?", choices:["Automatically done depending on how much pressure remaining", "At lift-off to start auto pressurization", "After aircraft safely touchdown", "Before take-off and 55 seconds after landing"], answer:3, explain:""},
      {q:"In AUTO MODE, what is the MAX controlled cabin altitude?", choices:["8000 feet maximum", "8600 feet maximum", "9550 feet maximum", "2000 feet maximum"], answer:0, explain:""},
      {q:"When the EXTRACT pushbutton is in OVRD,", choices:["The extract fan is stopped", "The system is in close circuit and adds air from the aircond system", "The blower fan is set to OFF", "The system is in close circuit and adds air from outside the aircraft"], answer:1, explain:""},
      {q:"What will happen when \"PACK REG - FAULT\" appears on the ECAM COND page?", choices:["Optimized and backup temperature regulation is lost.", "HOT AIR valves close and TRIM AIR valves still open.", "Packs deliver a fixed temperature 20°C to all zones.", "All of the above are correct."], answer:0, explain:""},
      {q:"What automatically depressurizes the aircraft on ground in case of abnormal residual pressure?", choices:["Residual Pressure Control Unit", "ADIRS", "CPC 1", "Cabin Mode Controller"], answer:0, explain:""},
      {q:"What is the function of safety valves?", choices:["To prevent cabin pressure from going too high or too low.", "To adjust pressure in the cabin for passenger comfort.", "To back up both CPCs and operate the manual motor after 2 automatic motors failure.", "To open emer ram air inlet in case of pressurization system failure"], answer:0, explain:""},
      {q:"How to add the air from air conditioning to avionics equipment?", choices:["Press the BLOWER and EXTRACT pb.", "Press the DITCHING pb.", "Press the CAB FANS pb.", "Select HI at PACK FLOW switch."], answer:0, explain:""},

const STORE_KEY = "csr_exam_v1";
let stats = loadStats();
let session = null; // {pool, idx, answers[], catId, label}
let timer = null, timeLeft = 0;

/* ---------- storage (degrade gracefully if blocked) ---------- */
function loadStats(){
  try{ const r=localStorage.getItem(STORE_KEY); return r?JSON.parse(r):base(); }
  catch(e){ return base(); }
}
function base(){ return {cats:{}, history:[], quizzes:0}; }
function saveStats(){ try{ localStorage.setItem(STORE_KEY, JSON.stringify(stats)); }catch(e){} }

/* ---------- helpers ---------- */
const $ = id => document.getElementById(id);
const totalQ = EXAM.reduce((a,s)=>a+s.questions.length,0);
function catName(id){ const c=EXAM.find(x=>x.id===id); return c?c.name:id; }
function shuffle(a){ a=a.slice(); for(let i=a.length-1;i>0;i--){const j=Math.random()*(i+1)|0;[a[i],a[j]]=[a[j],a[i]];} return a; }
function show(view){ ["home","quiz","result"].forEach(v=>$(v).classList.toggle("hidden",v!==view)); window.scrollTo(0,0); }

function renderPerf(){
  const p=$("perfPanel");
  const done=Object.keys(stats.cats).length>0;
  if(!done){
    p.innerHTML=`<div class="perf-empty"><div class="ico">📊</div>
      <h3>สถิติของคุณ</h3>
      <p>ทำข้อสอบชุดแรกให้เสร็จ เพื่อดูคะแนน กราฟใยแมงมุมความแม่นยำรายหัวข้อ และการติดตามจุดแข็ง/จุดอ่อนได้ที่นี่</p></div>`;
    return;
  }
  const cats=Object.entries(stats.cats).map(([id,v])=>({id,name:catName(id),acc:Math.round(v.correct/v.total*100)}));
  const sorted=cats.slice().sort((a,b)=>b.acc-a.acc);
  const strong=sorted[0], weak=sorted[sorted.length-1];
  const totalCorrect=cats.reduce((a,c)=>a+stats.cats[c.id].correct,0);
  const totalAns=cats.reduce((a,c)=>a+stats.cats[c.id].total,0);
  const overall=Math.round(totalCorrect/totalAns*100);

  p.innerHTML=`
    <div class="perf-head">📊 สถิติของคุณ</div>
    <div class="perf-grid">
      <div class="radar-wrap">${radarSVG(cats.map(c=>c.name), cats.map(c=>c.acc))}</div>
      <div>
        <div class="stat-row">
          <div class="stat-box"><div class="n">${overall}%</div><div class="l">ความแม่นยำรวม</div></div>
          <div class="stat-box"><div class="n">${stats.quizzes}</div><div class="l">ชุดที่ทำแล้ว</div></div>
        </div>
        <div class="sw">
          <div class="tag strong"><div class="cap">จุดแข็ง</div><div class="v">${strong.name} · ${strong.acc}%</div></div>
          <div class="tag weak"><div class="cap">จุดอ่อน</div><div class="v">${weak.name} · ${weak.acc}%</div></div>
        </div>
      </div>
    </div>`;
}

/* ---------- radar chart (pure SVG) ---------- */
function radarSVG(labels, values){
  const N=labels.length, R=80, cx=100, cy=100;
  if(N<3){ // not enough axes for a radar — show simple bars
    return `<div style="font-size:12px;color:var(--muted);text-align:center">ทำครบ 3 หัวข้อขึ้นไป<br>เพื่อแสดงกราฟใยแมงมุม</div>`;
  }
  const pt=(i,r)=>{const a=-Math.PI/2 + i*2*Math.PI/N; return [cx+r*Math.cos(a), cy+r*Math.sin(a)];};
  let rings="";
  [.25,.5,.75,1].forEach(f=>{
    const p=labels.map((_,i)=>pt(i,R*f).join(",")).join(" ");
    rings+=`<polygon class="grid-line" points="${p}"/>`;
  });
  let axes="",lbls="",dots="";
  labels.forEach((lb,i)=>{
    const [x,y]=pt(i,R);
    axes+=`<line class="axis" x1="${cx}" y1="${cy}" x2="${x}" y2="${y}"/>`;
    const [lx,ly]=pt(i,R+17);
    const anchor=Math.abs(lx-cx)<8?"middle":(lx>cx?"start":"end");
    lbls+=`<text x="${lx}" y="${ly+3}" text-anchor="${anchor}">${lb}</text>`;
  });
  const area=values.map((v,i)=>pt(i,R*Math.max(v,2)/100).join(",")).join(" ");
  values.forEach((v,i)=>{const [x,y]=pt(i,R*Math.max(v,2)/100);dots+=`<circle class="dot" cx="${x}" cy="${y}" r="3.2"/>`;});
  return `<svg class="radar" viewBox="0 0 200 200" preserveAspectRatio="xMidYMid meet">
    ${rings}${axes}<polygon class="area" points="${area}"/>${dots}${lbls}</svg>`;
}

/* ---------- QUIZ flow ---------- */
function startQuiz(catId, count){
  let pool, label;
  if(catId==="__all__"){
    pool=shuffle([].concat(...EXAM.map(c=>c.questions.map(q=>({...q,catId:c.id})))));
    label="โหมดสุ่ม";
  }else{
    const c=EXAM.find(x=>x.id===catId);
    pool=shuffle(c.questions.map(q=>({...q,catId:c.id})));
    label=c.name;
  }
  if(count && count>0 && count<pool.length) pool=pool.slice(0,count);
  session={pool, idx:0, answers:new Array(pool.length).fill(null), label, catId, count};
  show("quiz"); renderQuestion();
}

/* ---------- question-count chooser ---------- */
let chooserCat=null, chooserMax=0;
function openChooser(catId, name, max){
  chooserCat=catId; chooserMax=max;
  $("countSub").textContent=name+" · มีทั้งหมด "+max+" ข้อ";
  const presets=[5,10,15,20].filter(n=>n<max);
  const grid=$("countGrid"); grid.innerHTML="";
  presets.forEach(n=>{
    const b=document.createElement("button");
    b.className="count-opt"; b.textContent=n+" ข้อ";
    b.onclick=()=>{ closeChooser(); startQuiz(catId,n); };
    grid.appendChild(b);
  });
  const all=document.createElement("button");
  all.className="count-opt"; all.innerHTML="ทั้งหมด<small>"+max+" ข้อ</small>";
  all.onclick=()=>{ closeChooser(); startQuiz(catId,max); };
  grid.appendChild(all);
  const inp=$("countInput"); inp.max=max; inp.value=Math.min(10,max); inp.placeholder="1–"+max;
  $("countModal").classList.add("show");
}
function closeChooser(){ $("countModal").classList.remove("show"); }
function confirmCustom(){
  let n=parseInt($("countInput").value,10);
  if(!n||n<1) n=1; if(n>chooserMax) n=chooserMax;
  closeChooser(); startQuiz(chooserCat,n);
}

function renderQuestion(){
  const s=session, q=s.pool[s.idx];
  $("qNum").textContent=s.idx+1;
  $("qTotal").textContent=s.pool.length;
  $("qBar").style.width=((s.idx)/s.pool.length*100)+"%";
  $("qCat").textContent=catName(q.catId);
  $("qText").textContent=q.q;
  const keys=["ก","ข","ค","ง"];
  const box=$("qOpts"); box.innerHTML="";
  q.choices.forEach((ch,i)=>{
    const b=document.createElement("button");
    b.className="opt"; b.innerHTML=`<span class="key">${keys[i]}</span><span>${ch}</span>`;
    b.onclick=()=>answer(i);
    box.appendChild(b);
  });
  $("qExplain").className="explain";
  $("nextBtn").classList.add("hidden");
  $("nextBtn").textContent = s.idx===s.pool.length-1 ? "ดูผลคะแนน →" : "ข้อถัดไป →";
  startTimer();
}

/* ---------- TIMER (30s ต่อข้อ) ---------- */
function startTimer(){
  clearInterval(timer);
  timeLeft=QTIME;
  paintTimer();
  timer=setInterval(()=>{
    timeLeft--;
    paintTimer();
    if(timeLeft<=0){ clearInterval(timer); timeUp(); }
  },1000);
}
function paintTimer(){
  const el=$("qTimer");
  $("qTime").textContent=Math.max(timeLeft,0);
  el.classList.toggle("warn", timeLeft<=10 && timeLeft>5);
  el.classList.toggle("danger", timeLeft<=5);
}
function stopTimer(){ clearInterval(timer); }
function timeUp(){
  const s=session, q=s.pool[s.idx];
  if(s.answers[s.idx]!==null) return;
  s.answers[s.idx]=-1; // หมดเวลา → นับเป็นตอบผิด
  const opts=$("qOpts").children;
  for(let k=0;k<opts.length;k++){
    opts[k].disabled=true;
    if(k===q.answer) opts[k].classList.add("correct");
    else opts[k].classList.add("dim");
  }
  const ex=$("qExplain");
  ex.className="explain show no";
  $("qExplainLbl").textContent="⏱ หมดเวลา · เฉลย";
  $("qExplainTxt").textContent=q.explain || "—";
  $("qBar").style.width=((s.idx+1)/s.pool.length*100)+"%";
  $("nextBtn").classList.remove("hidden");
  $("qTimer").classList.add("danger");
}

function answer(i){
  const s=session, q=s.pool[s.idx];
  if(s.answers[s.idx]!==null) return;
  stopTimer();
  s.answers[s.idx]=i;
  const correct=q.answer, ok=(i===correct);
  const opts=$("qOpts").children;
  for(let k=0;k<opts.length;k++){
    opts[k].disabled=true;
    if(k===correct) opts[k].classList.add("correct");
    else if(k===i) opts[k].classList.add("wrong");
    else opts[k].classList.add("dim");
  }
  const ex=$("qExplain");
  ex.className="explain show "+(ok?"ok":"no");
  $("qExplainLbl").textContent=(ok?"✓ ถูกต้อง":"✕ ยังไม่ถูก") + " · เฉลย";
  $("qExplainTxt").textContent=q.explain || "—";
  $("qBar").style.width=((s.idx+1)/s.pool.length*100)+"%";
  $("nextBtn").classList.remove("hidden");
}

function nextQuestion(){
  if(session.idx<session.pool.length-1){ session.idx++; renderQuestion(); window.scrollTo(0,0); }
  else finishQuiz();
}

/* ---------- RESULT ---------- */
function finishQuiz(){
  stopTimer();
  const s=session;
  let correct=0; const byCat={};
  s.pool.forEach((q,i)=>{
    const ok=s.answers[i]===q.answer;
    if(ok) correct++;
    if(!byCat[q.catId]) byCat[q.catId]={c:0,t:0};
    byCat[q.catId].t++; if(ok) byCat[q.catId].c++;
  });
  // persist stats
  stats.quizzes++;
  Object.entries(byCat).forEach(([id,v])=>{
    if(!stats.cats[id]) stats.cats[id]={correct:0,total:0};
    stats.cats[id].correct+=v.c; stats.cats[id].total+=v.t;
  });
  stats.history.unshift({label:s.label, correct, total:s.pool.length,
    date:new Date().toLocaleString("th-TH",{day:"2-digit",month:"short",hour:"2-digit",minute:"2-digit"})});
  stats.history=stats.history.slice(0,50);
  saveStats();

  const pct=Math.round(correct/s.pool.length*100);
  $("scoreRing").innerHTML=ringSVG(pct);
  $("scoreTitle").textContent=`${correct} / ${s.pool.length} ข้อ`;
  $("scoreSub").textContent=`ความแม่นยำ ${pct}% · ${s.label} · ${msg(pct)}`;

  const rc=$("resCats"); rc.innerHTML="";
  Object.entries(byCat).forEach(([id,v])=>{
    const p=Math.round(v.c/v.t*100);
    const col=p>=80?"var(--green)":p>=50?"var(--accent)":"var(--red)";
    rc.insertAdjacentHTML("beforeend",
      `<div class="res-cat"><span class="name">${catName(id)}</span>
       <span class="bar"><i style="width:${p}%;background:${col}"></i></span>
       <span class="sc">${v.c}/${v.t}</span></div>`);
  });
  $("retryBtn").onclick=()=>startQuiz(s.catId, s.count);
  show("result");
}
function msg(p){ return p>=90?"ยอดเยี่ยม!":p>=70?"ดีมาก":p>=50?"ผ่านเกณฑ์":"ต้องทบทวนเพิ่ม"; }

function ringSVG(pct){
  const R=52, C=2*Math.PI*R, off=C*(1-pct/100);
  const col=pct>=70?"var(--green)":pct>=50?"var(--accent)":"var(--red)";
  return `<svg width="140" height="140" viewBox="0 0 140 140">
    <circle cx="70" cy="70" r="${R}" fill="none" stroke="var(--line)" stroke-width="11"/>
    <circle cx="70" cy="70" r="${R}" fill="none" stroke="${col}" stroke-width="11"
      stroke-linecap="round" stroke-dasharray="${C}" stroke-dashoffset="${off}"
      transform="rotate(-90 70 70)" style="transition:stroke-dashoffset .6s"/>
    <text x="70" y="78" text-anchor="middle" font-size="30" font-weight="800" fill="${col}">${pct}%</text>
  </svg>`;
}

/* ---------- HISTORY ---------- */
function openHistory(){
  const l=$("histList");
  if(!stats.history.length){ l.innerHTML=`<div class="hist-empty">ยังไม่มีประวัติ — เริ่มทำข้อสอบชุดแรกได้เลย</div>`; }
  else{
    l.innerHTML=stats.history.map(h=>{
      const p=Math.round(h.correct/h.total*100);
      return `<div class="hist-item"><div class="src"><div class="t">${h.label}</div>
        <div class="d">${h.date} · ${h.correct}/${h.total} ข้อ</div></div>
        <div class="score">${p}%</div></div>`;
    }).join("");
  }
  $("histModal").classList.add("show");
}
function closeHistory(){ $("histModal").classList.remove("show"); }
function clearHistory(){
  if(confirm("ล้างประวัติและสถิติทั้งหมด?")){ stats=base(); saveStats(); renderHome(); closeHistory(); }
}
$("histModal").addEventListener("click",e=>{ if(e.target.id==="histModal") closeHistory(); });

function goHome(){ stopTimer(); renderHome(); show("home"); }

/* ---------- init ---------- */
renderHome();
</script>
</body>
</html>
